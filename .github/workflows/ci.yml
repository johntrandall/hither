name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        # Pin to v2.0.0 release sha (not @master) for reproducibility. Bump deliberately.
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          severity: warning
          scandir: .
          ignore_paths: completions

  tests:
    # Tests need plutil (macOS-only) and the bash + zsh + osascript stack.
    # macos-latest is a GitHub-hosted runner with all of these present.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run notification diff tests
        run: zsh tests/test-notify-diff.sh
      - name: Run LaunchAgent env tests
        run: zsh tests/test-launchagent-env.sh
